name: "our_retriever_max_pooling"

# 사용할 Pre-trained Backbone (Hugging Face Hub)
backbone: "vinai/xphonebert-base"

# 모델 세부 설정
dropout: 0.1
use_pooler: false       # True: [CLS]에 Pooler layer 통과 / False: Mean Pooling (추천)

# temperature 조절(추천값: 0.05 ~ 0.1)
temperature: 0.05

# Projection Layer (차원 축소 필요 시 설정, 안 쓰면 null)
# null로 두면 Backbone의 hidden_size (768) 그대로 사용
projection_dim: null